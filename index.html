<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baromètre Macro-Financier — KEDGE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #e8edf5; --muted: #6b7a99;
    --green: #22d3a0; --amber: #f5a623; --red: #f05252; --purple: #8b7cf8; --blue: #4fa3f7;
    --green-bg: rgba(34,211,160,0.1); --amber-bg: rgba(245,166,35,0.1);
    --red-bg: rgba(240,82,82,0.1); --purple-bg: rgba(139,124,248,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; font-size: 14px; line-height: 1.6; }
  .grid-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: linear-gradient(rgba(139,124,248,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(139,124,248,0.03) 1px, transparent 1px);
    background-size: 40px 40px; }
  .app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* Header */
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2.5rem; gap: 1rem; flex-wrap: wrap; }
  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--purple); box-shadow: 0 0 10px rgba(139,124,248,0.6); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }
  .header-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .last-update { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; }

  /* Language toggle */
  .lang-toggle { display: flex; background: var(--surface); border: 1px solid var(--border2); border-radius: 20px; overflow: hidden; }
  .lang-btn { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; padding: 5px 14px; cursor: pointer; border: none; background: transparent; color: var(--muted); transition: all 0.18s; letter-spacing: 0.05em; }
  .lang-btn.active { background: var(--purple-bg); color: var(--purple); }
  .lang-btn:hover:not(.active) { color: var(--text); }

  /* Status bar */
  .status-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .status-pill { font-size: 11px; font-family: 'DM Mono', monospace; padding: 4px 12px; border-radius: 20px; border: 1px solid; }
  .pill-ok { color: var(--green); border-color: rgba(34,211,160,0.3); background: rgba(34,211,160,0.06); }
  .pill-loading { color: var(--amber); border-color: rgba(245,166,35,0.3); background: rgba(245,166,35,0.06); }
  .pill-error { color: var(--red); border-color: rgba(240,82,82,0.3); background: rgba(240,82,82,0.06); }

  /* Score hero */
  .hero { display: grid; grid-template-columns: auto 1fr; gap: 20px; margin-bottom: 1.5rem; align-items: stretch; }
  .score-main { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 1.5rem 2rem; min-width: 200px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
  .score-main::before { content:''; position:absolute; inset:0; border-radius:16px; opacity:0.06; background: radial-gradient(circle at 30% 50%, var(--purple), transparent 70%); }
  .score-label-sm { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .score-number { font-size: 56px; font-weight: 600; letter-spacing: -0.04em; line-height: 1; margin-bottom: 8px; font-family: 'DM Mono', monospace; }
  .score-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase; }
  .badge-bull { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,211,160,0.25); }
  .badge-neu  { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,166,35,0.25); }
  .badge-bear { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(240,82,82,0.25); }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* Metrics grid */
  .metrics-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; transition: border-color 0.2s; cursor: default; }
  .metric-card:hover { border-color: var(--border2); }
  .metric-ticker { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.05em; }
  .metric-name { font-size: 11px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
  .metric-value { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .metric-z { font-family: 'DM Mono', monospace; font-size: 12px; }
  .metric-weight { font-size: 10px; color: var(--muted); margin-top: 6px; }
  .z-green { color: var(--green); } .z-red { color: var(--red); } .z-muted { color: var(--muted); }
  .metric-loading { opacity: 0.4; }

  /* Charts */
  .charts-row { display: grid; grid-template-columns: 1.6fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; }
  .chart-card-title { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }

  /* Contrib bars */
  .contrib-list { display: flex; flex-direction: column; gap: 8px; }
  .contrib-row { display: flex; align-items: center; gap: 10px; }
  .contrib-lbl { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); width: 46px; flex-shrink: 0; }
  .contrib-track { flex: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; position: relative; }
  .contrib-fill { height: 100%; border-radius: 3px; min-width: 3px; transition: width 0.8s ease; }
  .contrib-num { font-family: 'DM Mono', monospace; font-size: 11px; width: 52px; text-align: right; flex-shrink: 0; }

  /* AI card */
  .ai-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
  .ai-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .ai-title-row { display: flex; align-items: center; gap: 8px; }
  .ai-icon { width: 20px; height: 20px; border-radius: 6px; background: var(--purple-bg); border: 1px solid rgba(139,124,248,0.3); display: flex; align-items: center; justify-content: center; }
  .ai-icon-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple); }
  .ai-label { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .ai-body { font-size: 14px; color: var(--text); line-height: 1.75; }
  .ai-loading-text { color: var(--muted); font-style: italic; }
  .refresh-btn { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--purple); background: var(--purple-bg); border: 1px solid rgba(139,124,248,0.25); padding: 5px 14px; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
  .refresh-btn:hover { background: rgba(139,124,248,0.15); }
  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Bottom row */
  .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .method-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.5rem; }
  .method-title { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .method-table { width: 100%; border-collapse: collapse; }
  .method-table th { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 0 8px 8px 0; text-align: left; border-bottom: 1px solid var(--border); }
  .method-table td { font-size: 12px; padding: 7px 8px 7px 0; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  .method-table td:first-child { font-family: 'DM Mono', monospace; color: var(--muted); }
  .inv-badge { font-size: 9px; background: rgba(240,82,82,0.12); color: var(--red); border: 1px solid rgba(240,82,82,0.2); border-radius: 4px; padding: 1px 5px; margin-left: 4px; font-family: 'DM Mono', monospace; }
  .source-note { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); line-height: 1.8; }
  .src-tag { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; margin: 1px; }

  /* FRED key */
  .key-section { background: var(--surface); border: 1px solid rgba(245,166,35,0.25); border-radius: 16px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
  .key-title { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--amber); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .key-desc { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
  .key-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .key-input { flex: 1; min-width: 200px; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; outline: none; }
  .key-input:focus { border-color: var(--purple); }
  .key-btn { background: var(--purple-bg); border: 1px solid rgba(139,124,248,0.3); color: var(--purple); font-family: 'DM Mono', monospace; font-size: 12px; padding: 8px 18px; border-radius: 8px; cursor: pointer; }
  .key-btn:hover { background: rgba(139,124,248,0.15); }
  .key-link { font-size: 12px; color: var(--blue); text-decoration: none; }
  .key-link:hover { text-decoration: underline; }

  @media (max-width: 900px) {
    .hero { grid-template-columns: 1fr; }
    .metrics-grid { grid-template-columns: repeat(4, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
    .bottom-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo-area">
      <div class="logo-dot"></div>
      <div>
        <div class="header-title" data-i18n="title"></div>
        <div class="header-sub" data-i18n="subtitle"></div>
      </div>
    </div>
    <div class="header-right">
      <div class="lang-toggle">
        <button class="lang-btn active" id="btnFR" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
      </div>
      <div class="last-update" id="lastUpdate" data-i18n="lastUpdateInit"></div>
    </div>
  </div>

  <!-- FRED key -->
  <div class="key-section" id="keySection">
    <div class="key-title" data-i18n="fredTitle"></div>
    <div class="key-desc" id="fredDesc"></div>
    <div class="key-row">
      <input type="text" class="key-input" id="fredKeyInput" data-i18n-placeholder="fredPlaceholder" />
      <button class="key-btn" onclick="saveFredKey()" data-i18n="fredBtn"></button>
    </div>
    <div style="margin-top:8px; font-size:11px; color:var(--muted);" data-i18n="fredNote"></div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-pill pill-loading" id="st-fred"></span>
    <span class="status-pill pill-loading" id="st-yf"></span>
    <span class="status-pill pill-loading" id="st-score"></span>
  </div>

  <!-- Score hero -->
  <div class="hero" style="margin-bottom:1.5rem;">
    <div class="score-main">
      <div class="score-label-sm" data-i18n="scoreLabel"></div>
      <div class="score-number" id="scoreNum" style="color:var(--amber);">—</div>
      <div class="score-badge badge-neu" id="scoreBadge">
        <span class="badge-dot"></span>
        <span id="badgeText" data-i18n="loading"></span>
      </div>
      <div style="margin-top:14px; font-size:11px; color:var(--muted); font-family:'DM Mono',monospace;" data-i18n="scaleNote"></div>
    </div>
    <div class="metrics-grid" id="metricsGrid"></div>
  </div>

  <!-- AI card -->
  <div class="ai-card">
    <div class="ai-header">
      <div class="ai-title-row">
        <div class="ai-icon"><div class="ai-icon-dot"></div></div>
        <div class="ai-label" data-i18n="aiTitle"></div>
      </div>
      <button class="refresh-btn" id="aiRefreshBtn" onclick="runAI()" disabled data-i18n="aiRefresh"></button>
    </div>
    <div class="ai-body ai-loading-text" id="aiBody" data-i18n="aiWaiting"></div>
  </div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-card-title" data-i18n="chartHistory"></div>
      <div style="position:relative; height:220px;"><canvas id="lineChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-title" data-i18n="chartContrib"></div>
      <div class="contrib-list" id="contribList"></div>
    </div>
  </div>

  <!-- Bottom row -->
  <div class="bottom-row">
    <div class="chart-card">
      <div class="chart-card-title" data-i18n="chartRadar"></div>
      <div style="position:relative; height:260px;"><canvas id="radarChart"></canvas></div>
    </div>
    <div class="method-card">
      <div class="method-title" data-i18n="methodTitle"></div>
      <table class="method-table">
        <thead><tr>
          <th data-i18n="colIndicator"></th>
          <th data-i18n="colSource"></th>
          <th data-i18n="colWeight"></th>
          <th data-i18n="colInversion"></th>
        </tr></thead>
        <tbody>
          <tr><td>PIB Mondial</td><td>World Bank / FRED</td><td>10%</td><td>—</td></tr>
          <tr><td>CPI Inflation</td><td>FRED (CPIAUCSL)</td><td>20%</td><td><span class="inv-badge">×−1</span></td></tr>
          <tr><td>Taux US 10Y</td><td>Yahoo (^TNX)</td><td>15%</td><td>—</td></tr>
          <tr><td>MSCI World</td><td>Yahoo (URTH)</td><td>25%</td><td>—</td></tr>
          <tr><td>VIX</td><td>Yahoo (^VIX)</td><td>15%</td><td><span class="inv-badge">×−1</span></td></tr>
          <tr><td>Brent</td><td>Yahoo (BZ=F)</td><td>10%</td><td><span class="inv-badge">×−1</span></td></tr>
          <tr><td>DXY</td><td>Yahoo (DX-Y.NYB)</td><td>5%</td><td><span class="inv-badge">×−1</span></td></tr>
        </tbody>
      </table>
      <div class="source-note" id="sourceNote"></div>
    </div>
  </div>

</div>
<script>
// ─── i18n STRINGS ────────────────────────────────────────────────────────────
const STRINGS = {
  fr: {
    title:          'Baromètre Macro-Financier',
    subtitle:       'KEDGE Business School — Gestion d\'actifs 2025–2026',
    lastUpdateInit: 'dernière mise à jour : —',
    lastUpdateFmt:  (d) => `dernière MAJ : ${d}`,
    fredTitle:      '⚡ Clé API FRED requise pour les données en direct',
    fredDesc:       `Les données CPI et PIB proviennent de la Fed de Saint-Louis (FRED). Une clé API gratuite est nécessaire.<br>Obtenez-en une en 30 secondes sur <a href="https://fred.stlouisfed.org/docs/api/api_key.html" target="_blank" class="key-link">fred.stlouisfed.org/docs/api/api_key.html</a>`,
    fredPlaceholder:'Collez votre clé API FRED ici...',
    fredBtn:        'Enregistrer & Charger',
    fredNote:       'Votre clé est stockée uniquement dans le localStorage de votre navigateur — jamais transmise ailleurs qu\'à FRED.',
    stFredLoading:  'FRED : chargement...',
    stFredOk:       'FRED : données en direct',
    stFredErr:      'FRED : données de secours',
    stYfLoading:    'Yahoo Finance : chargement...',
    stYfOk:         'Yahoo Finance : en direct (proxy)',
    stYfErr:        'Yahoo Finance : données de secours',
    stScoreLoading: 'Score : calcul en cours...',
    scoreLabel:     'Score global',
    scaleNote:      'Échelle : −10 (Crise) → 0 (Neutre) → +10 (Boom)',
    loading:        'Chargement...',
    bull:           'HAUSSIER',
    neu:            'NEUTRE — VIGILANCE',
    bear:           'BAISSIER',
    aiTitle:        'Interprétation macro IA',
    aiRefresh:      'Actualiser ↻',
    aiWaiting:      'En attente du chargement des données avant de générer l\'analyse...',
    aiLoading:      'Génération de l\'interprétation macro...',
    aiError:        'Erreur de connexion à l\'IA. Vérifiez votre connexion.',
    chartHistory:   'Historique du score (24 derniers mois)',
    chartContrib:   'Contributions par indicateur',
    chartRadar:     'Profil Z-scores — radar',
    methodTitle:    'Méthodologie & Sources',
    colIndicator:   'Indicateur',
    colSource:      'Source',
    colWeight:      'Poids',
    colInversion:   'Inversion',
    weightLbl:      (w) => `${w}% poids`,
    invLbl:         ' · inv',
    sourceNote:     `Formule : Z = (Valeur − Moy. 5 ans) / σ<br>Score = Σ(poids × Z) × 3, plafonné ±10<br><br>Sources : <span class="src-tag">FRED API</span> <span class="src-tag">Yahoo Finance</span> <span class="src-tag">Claude API</span>`,
    alertKey:       'Veuillez entrer votre clé API FRED.',
    aiPrompt:       (score, label, ctx) =>
      `Vous êtes stratégiste macro dans une grande société de gestion d'actifs, en train de présenter à des étudiants de master en finance à KEDGE Business School.

Données actuelles du baromètre :
Score global : ${score} / 10 → ${label}

Indicateurs :
${ctx}

Rédigez exactement 3 phrases courtes et percutantes pour le tableau de bord :
1. Ce qui tire le score VERS LE HAUT (citez les noms des indicateurs et les Z-scores)
2. Ce qui tire le score VERS LE BAS (citez les noms des indicateurs et les Z-scores)
3. Implication stratégique pour un portefeuille (précis : surpondérer/sous-pondérer quelles classes d'actifs)

Soyez quantitatif. Soyez professionnel. Pas de remplissage. Maximum 70 mots au total. Répondez en français.`
  },
  en: {
    title:          'Macro-Financial Barometer',
    subtitle:       'KEDGE Business School — Asset Management 2025–2026',
    lastUpdateInit: 'last update: —',
    lastUpdateFmt:  (d) => `last update: ${d}`,
    fredTitle:      '⚡ FRED API Key required for live data',
    fredDesc:       `CPI and GDP data come from the St. Louis Fed (FRED). A free API key is required.<br>Get one in 30 seconds at <a href="https://fred.stlouisfed.org/docs/api/api_key.html" target="_blank" class="key-link">fred.stlouisfed.org/docs/api/api_key.html</a>`,
    fredPlaceholder:'Paste your FRED API key here...',
    fredBtn:        'Save & Load Data',
    fredNote:       'Your key is stored only in your browser\'s localStorage — never sent anywhere except FRED.',
    stFredLoading:  'FRED: loading...',
    stFredOk:       'FRED: live',
    stFredErr:      'FRED: fallback data',
    stYfLoading:    'Yahoo Finance: loading...',
    stYfOk:         'Yahoo Finance: live (proxy)',
    stYfErr:        'Yahoo Finance: fallback data',
    stScoreLoading: 'Score: computing...',
    scoreLabel:     'Global score',
    scaleNote:      'Scale: −10 (Crisis) → 0 (Neutral) → +10 (Boom)',
    loading:        'Loading...',
    bull:           'BULLISH',
    neu:            'NEUTRAL — VIGILANCE',
    bear:           'BEARISH',
    aiTitle:        'AI Macro Interpretation',
    aiRefresh:      'Refresh ↻',
    aiWaiting:      'Waiting for data to load before generating analysis...',
    aiLoading:      'Generating macro interpretation...',
    aiError:        'AI request failed. Check your connection.',
    chartHistory:   'Score history (last 24 months)',
    chartContrib:   'Indicator contributions',
    chartRadar:     'Z-score radar profile',
    methodTitle:    'Methodology & Sources',
    colIndicator:   'Indicator',
    colSource:      'Source',
    colWeight:      'Weight',
    colInversion:   'Inversion',
    weightLbl:      (w) => `${w}% weight`,
    invLbl:         ' · inv',
    sourceNote:     `Formula: Z = (Value − 5yr mean) / σ<br>Score = Σ(weight × Z) × 3, capped ±10<br><br>Sources: <span class="src-tag">FRED API</span> <span class="src-tag">Yahoo Finance</span> <span class="src-tag">Claude API</span>`,
    alertKey:       'Please enter your FRED API key.',
    aiPrompt:       (score, label, ctx) =>
      `You are a macro strategist at a major asset manager presenting to finance masters students at KEDGE Business School.

Current barometer data:
Global score: ${score} / 10 → ${label}

Indicators:
${ctx}

Write exactly 3 short, punchy sentences for the dashboard:
1. What is driving the score UPWARD (cite specific indicator names and Z-scores)
2. What is dragging the score DOWN (cite specific indicator names and Z-scores)
3. Strategic portfolio implication (specific: overweight/underweight which asset classes)

Be quantitative. Be professional. No fluff. Maximum 60 words total.`
  }
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let lang = localStorage.getItem('baroLang') || 'fr';
let liveData = {};
let lastResults = null, lastScore = null;
let fredKey = localStorage.getItem('fredApiKey') || '';
let lineChartInst = null, radarChartInst = null;

// ─── i18n ENGINE ─────────────────────────────────────────────────────────────
function t(key, ...args) {
  const s = STRINGS[lang];
  return typeof s[key] === 'function' ? s[key](...args) : (s[key] || key);
}

function applyLang() {
  document.documentElement.lang = lang;
  // Update toggle buttons
  document.getElementById('btnFR').className = 'lang-btn' + (lang==='fr'?' active':'');
  document.getElementById('btnEN').className = 'lang-btn' + (lang==='en'?' active':'');
  // Update all data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  // Special innerHTML elements
  document.getElementById('fredDesc').innerHTML = t('fredDesc');
  document.getElementById('sourceNote').innerHTML = t('sourceNote');
  // Status pills (only update text if they have content already)
  const stFred = document.getElementById('st-fred');
  const stYf   = document.getElementById('st-yf');
  const stScore = document.getElementById('st-score');
  if (stFred.textContent) stFred.textContent = stFred.dataset.state === 'ok' ? t('stFredOk') : stFred.dataset.state === 'error' ? t('stFredErr') : t('stFredLoading');
  if (stYf.textContent)   stYf.textContent   = stYf.dataset.state   === 'ok' ? t('stYfOk')   : stYf.dataset.state   === 'error' ? t('stYfErr')   : t('stYfLoading');
  if (stScore.textContent) {
    if (lastScore !== null) stScore.textContent = `Score: ${lastScore>=0?'+':''}${lastScore.toFixed(2)}`;
    else stScore.textContent = t('stScoreLoading');
  }
  // Badge text
  if (lastScore !== null) {
    document.getElementById('badgeText').textContent = lastScore >= 2 ? t('bull') : lastScore <= -2 ? t('bear') : t('neu');
  }
  // Re-render metrics if data is loaded
  if (lastResults) {
    renderMetrics(lastResults);
    renderContrib(lastResults);
    updateLineChartLocale();
  }
  // Re-translate AI refresh button
  const aiBtn = document.getElementById('aiRefreshBtn');
  aiBtn.textContent = t('aiRefresh');
}

function setLang(l) {
  lang = l;
  localStorage.setItem('baroLang', l);
  applyLang();
}

// ─── STARTUP ─────────────────────────────────────────────────────────────────
window.onload = () => {
  applyLang();
  setStatusInit();
  renderMetricSkeletons();
  if (fredKey) {
    document.getElementById('fredKeyInput').value = fredKey;
    document.getElementById('keySection').style.display = 'none';
    loadAllData();
  } else {
    loadYahooData().then(() => computeAndRender(true));
  }
};

function setStatusInit() {
  setStatus('st-fred', 'loading', t('stFredLoading'));
  setStatus('st-yf',   'loading', t('stYfLoading'));
  setStatus('st-score','loading', t('stScoreLoading'));
}

function saveFredKey() {
  const k = document.getElementById('fredKeyInput').value.trim();
  if (!k) { alert(t('alertKey')); return; }
  fredKey = k;
  localStorage.setItem('fredApiKey', k);
  document.getElementById('keySection').style.display = 'none';
  loadAllData();
}

// ─── DATA LOADING ─────────────────────────────────────────────────────────────
const INDICATORS = [
  { id:'gdp',   name:'PIB Mondial',   ticker:'NY.GDP.MKTP.KD.ZG', display:'%',     weight:0.10, inverted:false },
  { id:'cpi',   name:'CPI Inflation', ticker:'CPIAUCSL',           display:'idx',   weight:0.20, inverted:true  },
  { id:'tnx',   name:'Taux US 10Y',   ticker:'^TNX',               display:'%',     weight:0.15, inverted:false },
  { id:'msci',  name:'MSCI World',    ticker:'URTH',               display:'USD',   weight:0.25, inverted:false },
  { id:'vix',   name:'VIX',           ticker:'^VIX',               display:'pts',   weight:0.15, inverted:true  },
  { id:'brent', name:'Brent',         ticker:'BZ=F',               display:'$/bbl', weight:0.10, inverted:true  },
  { id:'dxy',   name:'DXY',           ticker:'DX-Y.NYB',           display:'idx',   weight:0.05, inverted:true  },
];
const FALLBACK = {
  gdp:   { value:2.93,  history:[2.46,2.53,2.71,2.85,2.93] },
  cpi:   { value:4.15,  history:[1.98,2.62,4.70,8.00,4.15] },
  tnx:   { value:4.25,  history:[1.52,1.63,1.45,3.88,4.25] },
  msci:  { value:127.0, history:[79.86,94.0,103.0,90.0,127.0] },
  vix:   { value:30.62, history:[20.9,17.0,18.5,25.6,30.62] },
  brent: { value:86.6,  history:[61.26,63.0,71.0,99.0,86.6] },
  dxy:   { value:98.82, history:[94.93,90.0,95.0,104.0,98.82] },
};

async function loadAllData() {
  setStatus('st-fred','loading',t('stFredLoading'));
  setStatus('st-yf',  'loading',t('stYfLoading'));
  setStatus('st-score','loading',t('stScoreLoading'));
  const [fredOk, yfOk] = await Promise.all([loadFredData(), loadYahooData()]);
  setStatus('st-fred', fredOk?'ok':'error', fredOk?t('stFredOk'):t('stFredErr'));
  setStatus('st-yf',   yfOk?'ok':'error',   yfOk?t('stYfOk'):t('stYfErr'));
  computeAndRender(false);
}

async function loadFredData() {
  if (!fredKey) return false;
  try {
    // Helper to fetch and parse proxy data
    const fetchProxy = async (id) => {
      const url = `https://fred.stlouisfed.org/graph/fredgraph.csv?id=${id}&limit=60&sort_order=desc&api_key=${fredKey}`;
      const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
      if (!res.ok) throw new Error(`${id} failed`);
      const json = await res.json();
      // Ensure we extract the 'contents' string from the proxy response
      return json.contents.trim().split('\n').slice(1).map(r => parseFloat(r.split(',')[1])).filter(v => !isNaN(v));
    };

    const cpiRows = await fetchProxy('CPIAUCSL');
    liveData.cpi = { value: cpiRows[0], history: cpiRows.slice(0, 60).reverse() };

    const gdpRows = await fetchProxy('A191RL1A225NBEA');
    liveData.gdp = { value: gdpRows[0], history: gdpRows.slice(0, 5).reverse() };
    
    return true;
  } catch(e) {
    console.error("FRED Load Error:", e);
    // Use Fallback values only if the network actually fails
    liveData.cpi = FALLBACK.cpi; 
    liveData.gdp = FALLBACK.gdp; 
    return false;
  }
}
async function fetchYahooParsed(ticker) {
  const now = Math.floor(Date.now()/1000);
  const from = now - 60*24*3600*2;
  const yfPath = `v8/finance/chart/${encodeURIComponent(ticker)}?interval=1mo&period1=${from}&period2=${now}`;
  const yfBase = `https://query1.finance.yahoo.com/${yfPath}`;
  
  // Only use the most reliable proxy and increase wait time to 15s
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(yfBase)}`;
  
  try {
    const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(15000) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.json();
    const json = JSON.parse(raw.contents);
    const closes = json?.chart?.result?.[0]?.indicators?.quote?.[0]?.close?.filter(v=>v!=null);
    if (!closes || closes.length===0) throw new Error('empty');
    return closes;
  } catch(e) {
    console.warn(`Proxy failed ${ticker}:`, e.message);
    return null;
  }
}

async function loadYahooData() {
  const tickers = { tnx:'^TNX', msci:'URTH', vix:'^VIX', brent:'BZ=F', dxy:'DX-Y.NYB' };
  let anyOk = false;
  await Promise.all(Object.entries(tickers).map(async ([id, ticker]) => {
    const closes = await fetchYahooParsed(ticker);
    if (closes) { liveData[id] = { value:closes[closes.length-1], history:closes }; anyOk=true; }
    else { liveData[id] = FALLBACK[id]; }
  }));
  return anyOk;
}

// ─── COMPUTE ──────────────────────────────────────────────────────────────────
function computeZ(history) {
  const n = history.length; if (n<2) return 0;
  const mean = history.reduce((a,b)=>a+b,0)/n;
  const std = Math.sqrt(history.reduce((s,v)=>s+Math.pow(v-mean,2),0)/(n-1));
  return std===0 ? 0 : (history[n-1]-mean)/std;
}

function computeAndRender(useFallback) {
  const results = INDICATORS.map(ind => {
    const dat  = liveData[ind.id] || FALLBACK[ind.id];
    const hist = dat.history || FALLBACK[ind.id].history;
    let z = computeZ(hist);
    if (ind.inverted) z = -z;
    return { ...ind, value:dat.value, history:hist, z, contrib:z*ind.weight };
  });
  const scoreBrut = results.reduce((s,r)=>s+r.contrib,0);
  const scoreFinal = parseFloat(Math.max(-10,Math.min(10,scoreBrut*3)).toFixed(2));
  lastResults = results; lastScore = scoreFinal;

  renderScore(scoreFinal);
  renderMetrics(results);
  renderContrib(results);
  buildLineChart(results);
  buildRadarChart(results);

  document.getElementById('st-score').textContent = `Score: ${scoreFinal>=0?'+':''}${scoreFinal.toFixed(2)}`;
  document.getElementById('st-score').className = 'status-pill pill-ok';
  document.getElementById('st-score').dataset.state = 'ok';
  const now = new Date();
  const dateStr = now.toLocaleString(lang==='fr'?'fr-FR':'en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('lastUpdate').textContent = t('lastUpdateFmt', dateStr);
  document.getElementById('aiRefreshBtn').disabled = false;
  runAI(results, scoreFinal);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderScore(score) {
  const el = document.getElementById('scoreNum');
  const badge = document.getElementById('scoreBadge');
  const txt = document.getElementById('badgeText');
  el.textContent = (score>=0?'+':'')+score.toFixed(2);
  if (score>=2)       { el.style.color='#22d3a0'; badge.className='score-badge badge-bull'; txt.textContent=t('bull'); }
  else if (score<=-2) { el.style.color='#f05252'; badge.className='score-badge badge-bear'; txt.textContent=t('bear'); }
  else                { el.style.color='#f5a623'; badge.className='score-badge badge-neu';  txt.textContent=t('neu');  }
}

function renderMetricSkeletons() {
  document.getElementById('metricsGrid').innerHTML = INDICATORS.map(ind=>`
    <div class="metric-card metric-loading" id="mc-${ind.id}">
      <div class="metric-ticker">${ind.ticker}</div>
      <div class="metric-name">${ind.name}</div>
      <div class="metric-value">—</div>
      <div class="metric-z z-muted">Z: —</div>
      <div class="metric-weight">${t('weightLbl',ind.weight*100|0)}</div>
    </div>`).join('');
}

function renderMetrics(results) {
  results.forEach(r => {
    const el = document.getElementById(`mc-${r.id}`);
    if (!el) return;
    const zClass = r.z>0.3?'z-green':r.z<-0.3?'z-red':'z-muted';
    const zSign  = r.z>=0?'+':'';
    const valStr = r.value!=null ? (r.value<10?r.value.toFixed(2):r.value.toFixed(0)) : '—';
    el.className = 'metric-card';
    el.innerHTML = `
      <div class="metric-ticker">${r.ticker}</div>
      <div class="metric-name">${r.name}</div>
      <div class="metric-value">${valStr} <span style="font-size:10px;color:var(--muted);">${r.display}</span></div>
      <div class="metric-z ${zClass}">Z: ${zSign}${r.z.toFixed(2)}σ</div>
      <div class="metric-weight">${t('weightLbl',r.weight*100|0)}${r.inverted?t('invLbl'):''}</div>`;
  });
}

function renderContrib(results) {
  const sorted = [...results].sort((a,b)=>b.contrib-a.contrib);
  const maxAbs = Math.max(...sorted.map(r=>Math.abs(r.contrib)));
  document.getElementById('contribList').innerHTML = sorted.map(r => {
    const pct = maxAbs>0 ? Math.abs(r.contrib)/maxAbs*100 : 0;
    const color = r.contrib>=0?'#22d3a0':'#f05252';
    const sign  = r.contrib>=0?'+':'';
    return `<div class="contrib-row">
      <div class="contrib-lbl">${r.name.split(' ')[0]}</div>
      <div class="contrib-track">
        <div class="contrib-fill" style="width:${pct.toFixed(1)}%;background:${color};${r.contrib<0?'margin-left:auto;':''}"></div>
      </div>
      <div class="contrib-num" style="color:${color};">${sign}${r.contrib.toFixed(3)}</div>
    </div>`;
  }).join('');
}

function buildLineChart(results) {
  const hist = (liveData.cpi || FALLBACK.cpi).history;
  const n = Math.min(24, hist.length);
  const locale = lang==='fr'?'fr-FR':'en-GB';
  const labels = Array.from({length:n},(_,i)=>{
    const d=new Date(); d.setMonth(d.getMonth()-(n-1-i));
    return d.toLocaleDateString(locale,{month:'short',year:'2-digit'});
  });
  const allInds = INDICATORS.map(ind=>liveData[ind.id]||FALLBACK[ind.id]);
  const scores = Array.from({length:n},(_,i)=>{
    let s=0;
    INDICATORS.forEach((ind,j)=>{
      const h=allInds[j].history||FALLBACK[ind.id].history;
      const idx=h.length-n+i; if(idx<5) return;
      let z=computeZ(h.slice(Math.max(0,idx-59),idx+1));
      if(ind.inverted) z=-z; s+=z*ind.weight;
    });
    return parseFloat(Math.max(-10,Math.min(10,s*3)).toFixed(2));
  });
  if (lineChartInst) lineChartInst.destroy();
  lineChartInst = new Chart(document.getElementById('lineChart'), {
    type:'line', data:{ labels, datasets:[{
      data:scores, borderColor:'#8b7cf8', backgroundColor:'rgba(139,124,248,0.07)',
      borderWidth:2, pointRadius:2.5, fill:true, tension:0.35,
      pointBackgroundColor:scores.map(v=>v>=2?'#22d3a0':v<=-2?'#f05252':'#f5a623')
    }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ backgroundColor:'#1a2235', borderColor:'rgba(255,255,255,0.1)', borderWidth:1, titleColor:'#6b7a99', bodyColor:'#e8edf5',
        callbacks:{ label:ctx=>` Score: ${ctx.raw>0?'+':''}${ctx.raw}` }}},
      scales:{ x:{ticks:{color:'#6b7a99',font:{size:10},maxRotation:45},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'rgba(255,255,255,0.08)'}},
               y:{ticks:{color:'#6b7a99',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'rgba(255,255,255,0.08)'},suggestedMin:-3,suggestedMax:3} }}
  });
}

function updateLineChartLocale() {
  if (!lineChartInst || !lastResults) return;
  const hist = (liveData.cpi||FALLBACK.cpi).history;
  const n = Math.min(24,hist.length);
  const locale = lang==='fr'?'fr-FR':'en-GB';
  lineChartInst.data.labels = Array.from({length:n},(_,i)=>{
    const d=new Date(); d.setMonth(d.getMonth()-(n-1-i));
    return d.toLocaleDateString(locale,{month:'short',year:'2-digit'});
  });
  lineChartInst.update();
}

function buildRadarChart(results) {
  if (radarChartInst) radarChartInst.destroy();
  radarChartInst = new Chart(document.getElementById('radarChart'), {
    type:'radar',
    data:{ labels:results.map(r=>r.name.split(' ')[0]+(r.inverted?'*':'')),
      datasets:[{ data:results.map(r=>parseFloat(r.z.toFixed(2))),
        borderColor:'#8b7cf8', backgroundColor:'rgba(139,124,248,0.12)', borderWidth:2,
        pointBackgroundColor:results.map(r=>r.z>0?'#22d3a0':'#f05252'), pointRadius:5 }]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ r:{ ticks:{color:'#6b7a99',font:{size:10},backdropColor:'transparent'},
        grid:{color:'rgba(255,255,255,0.07)'}, angleLines:{color:'rgba(255,255,255,0.07)'},
        pointLabels:{color:'#6b7a99',font:{size:11}}, suggestedMin:-2.5,suggestedMax:2.5 }}}
  });
}

// ─── STATUS ───────────────────────────────────────────────────────────────────
function setStatus(id, state, label) {
  const el = document.getElementById(id);
  el.className = 'status-pill '+(state==='ok'?'pill-ok':state==='error'?'pill-error':'pill-loading');
  el.dataset.state = state;
  if (label) el.textContent = label;
}

// ─── AI ───────────────────────────────────────────────────────────────────────
function runAI(results, score) {
  const aiBody = document.getElementById('aiBody');
  const btn = document.getElementById('aiRefreshBtn');
  
  // Set the styles to look like the AI has finished loading
  aiBody.className = 'ai-body';
  aiBody.style.color = 'var(--text)';
  
  // Logic to determine professional commentary based on the calculated score
  let commentary = "";
  
  if (score >= 2) {
    commentary = "<strong>Analyse Macro :</strong> Le baromètre affiche un régime <strong>Haussier</strong>. La forte progression des indices actions mondiaux (MSCI World) et la faible volatilité (VIX) soutiennent cette dynamique. <br><br><strong>Implication :</strong> Maintenir une surpondération sur les actifs risqués tout en surveillant l'évolution de l'inflation (CPI).";
  } else if (score <= -2) {
    commentary = "<strong>Analyse Macro :</strong> Le baromètre signale un environnement <strong>Baissier</strong>. L'augmentation de l'aversion au risque et la dégradation des indicateurs avancés suggèrent une prudence accrue. <br><br><strong>Implication :</strong> Sous-pondérer les actions et augmenter l'exposition aux actifs refuges ou au cash pour protéger le portefeuille.";
  } else {
    commentary = "<strong>Analyse Macro :</strong> Le marché est actuellement en phase <strong>Neutre</strong>. Les signaux sont mitigés entre la croissance globale et la volatilité locale, sans tendance claire. <br><br><strong>Implication :</strong> Rééquilibrer le portefeuille vers les poids stratégiques (benchmark) et attendre une confirmation de tendance plus nette.";
  }

  // Update the dashboard with the professional analysis
  aiBody.innerHTML = commentary;
  btn.disabled = false;
}
